<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover" />
<title>ЕВА — AI медицинский ассистент (демо)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#21A038; --green-d:#00833E; --black:#1A1A1A;
    --g1:#F5F5F5; --g2:#E0E0E0; --g3:#8E8E93; --g4:#4A4A4A;
    --shadow:0 2px 8px rgba(0,0,0,.06);
    --shadow-2:0 4px 16px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%;background:#000;color:var(--black);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
    font-size:15px;line-height:1.4;-webkit-font-smoothing:antialiased}
  .app{max-width:420px;min-width:320px;margin:0 auto;height:100vh;height:100dvh;
    background:linear-gradient(180deg,#F5F5F5 0%,#FFFFFF 100%);
    display:flex;flex-direction:column;position:relative;overflow:hidden}

  /* Header */
  .header{background:#1A1A1A;color:#fff;padding:12px 14px;display:flex;align-items:center;gap:10px;
    border-bottom:2px solid var(--green);flex-shrink:0}
  .header-back{background:rgba(255,255,255,.06);border:none;color:#fff;width:32px;height:32px;border-radius:50%;
    cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;font-family:inherit;
    transition:background .15s;flex-shrink:0}
  .header-back:hover{background:rgba(255,255,255,.14)}
  .header-back[disabled]{opacity:.35;cursor:default}
  .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#21A038,#00833E);
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;
    flex-shrink:0;box-shadow:0 0 0 2px rgba(33,160,56,.3);overflow:hidden;position:relative}
  .avatar img{width:100%;height:100%;object-fit:cover;display:block}
  .header-info{flex:1;min-width:0}
  .header-name{font-weight:600;font-size:15px;line-height:1.2}
  .header-status{font-size:11.5px;color:#8E8E93;display:flex;align-items:center;gap:5px;margin-top:2px}
  .header-status::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green)}
  .step-indicator{font-size:11px;color:#8E8E93;background:rgba(255,255,255,.05);padding:3px 8px;border-radius:10px;white-space:nowrap}

  /* Scenario pill */
  .scenario-pill{background:#fff;border-bottom:1px solid var(--g2);padding:6px 14px;font-size:11.5px;
    color:var(--g4);display:flex;align-items:center;gap:6px;flex-shrink:0}
  .scenario-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}

  /* Chat */
  .chat{flex:1;overflow-y:auto;padding:14px 14px 8px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
  .chat::-webkit-scrollbar{width:0}
  .msg{max-width:85%;padding:10px 14px;border-radius:20px;font-size:14.5px;line-height:1.45;animation:in .25s ease}
  @keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .msg.eva{background:#fff;color:var(--black);align-self:flex-start;box-shadow:var(--shadow);border-top-left-radius:6px;white-space:pre-wrap}
  .msg.user{background:var(--green);color:#fff;align-self:flex-end;border-top-right-radius:6px;white-space:pre-wrap}
  .msg.system{background:#FFEAEA;color:#A30000;align-self:center;font-size:13px;text-align:center;border-radius:14px}
  .typing{align-self:flex-start;background:#fff;padding:12px 16px;border-radius:20px;border-top-left-radius:6px;box-shadow:var(--shadow);display:flex;gap:4px}
  .typing span{width:6px;height:6px;background:#8E8E93;border-radius:50%;animation:b 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes b{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}

  /* Answers */
  .answers{padding:8px 14px 14px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
  .btn{background:linear-gradient(135deg,#21A038,#00833E);color:#fff;border:none;border-radius:24px;
    padding:13px 18px;font-size:14.5px;font-weight:500;cursor:pointer;font-family:inherit;
    box-shadow:0 2px 8px rgba(33,160,56,.25);transition:transform .1s;text-align:center;line-height:1.3}
  .btn:active{transform:scale(.98)}
  .btn.ghost{background:#fff;color:var(--green-d);box-shadow:inset 0 0 0 1.5px var(--green)}
  .btn.dark{background:#1A1A1A;box-shadow:none}
  .btn.danger{background:linear-gradient(135deg,#E53935,#B71C1C);box-shadow:0 2px 8px rgba(229,57,53,.3)}
  .btn[disabled]{opacity:.5;pointer-events:none}
  .btn.small{padding:9px 14px;font-size:13px;border-radius:18px}
  .multi-opt{background:#fff;color:var(--black);border:1.5px solid var(--g2);border-radius:16px;padding:12px 14px;
    cursor:pointer;font-family:inherit;font-size:14px;text-align:left;display:flex;align-items:center;gap:10px;transition:all .15s}
  .multi-opt::before{content:"";width:20px;height:20px;border:2px solid var(--g2);border-radius:5px;flex-shrink:0;background:#fff;transition:all .15s}
  .multi-opt.sel{border-color:var(--green);background:#F2FAF4}
  .multi-opt.sel::before{background:var(--green) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path fill='white' d='M6.5 11.5L3 8l1-1 2.5 2.5L12 4l1 1z'/></svg>") center/14px no-repeat;border-color:var(--green)}
  .multi-opt.safe{border-color:var(--green);background:#F2FAF4;color:var(--green-d);font-weight:500}

  /* Screens */
  .screen-pad{padding:20px 18px;overflow-y:auto;flex:1}
  .hero-icon{width:96px;height:96px;border-radius:50%;margin:18px auto 18px;background:linear-gradient(135deg,#21A038,#00833E);
    display:flex;align-items:center;justify-content:center;font-size:46px;color:#fff;font-weight:700;
    box-shadow:0 8px 24px rgba(33,160,56,.35);overflow:hidden}
  .hero-icon img{width:100%;height:100%;object-fit:cover;border-radius:50%}
  h1{font-size:23px;font-weight:700;margin:0 0 12px;text-align:center}
  h1.left{text-align:left;font-size:21px}
  h2{font-size:17px;font-weight:600;margin:18px 0 10px}
  h3{font-size:14.5px;font-weight:600;margin:0 0 6px}
  .disclaimer{background:#FFF4E5;color:#8A5A00;padding:12px 14px;border-radius:14px;font-size:13px;line-height:1.45;margin:14px 0;border-left:3px solid #FFB74D}
  .footer-note{font-size:11px;color:var(--g3);text-align:center;padding:8px 14px 12px;flex-shrink:0}

  /* Persona constructor */
  .persona-q{background:#fff;border-radius:16px;padding:18px 16px;box-shadow:var(--shadow);margin-top:8px}
  .persona-q h2{margin:0 0 4px;font-size:18px}
  .persona-q .sub{color:var(--g3);font-size:13px;margin-bottom:14px}
  .persona-summary{background:#fff;border-radius:18px;padding:18px 18px;box-shadow:var(--shadow-2);margin:10px 0 14px}
  .persona-summary .row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--g1);font-size:14px}
  .persona-summary .row:last-child{border-bottom:none}
  .persona-summary .ico{font-size:18px;width:24px;text-align:center;flex-shrink:0}
  .persona-summary .val{flex:1}
  .persona-visits{background:#F2FAF4;border-radius:14px;padding:12px 14px;margin-top:8px;font-size:13px;line-height:1.5}
  .persona-visits b{color:var(--green-d)}
  .persona-visits .v{padding:6px 0;border-top:1px dashed #C8E6C9}
  .persona-visits .v:first-of-type{border-top:none}

  /* Hub */
  .hub-card{background:#fff;border-radius:18px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);
    cursor:pointer;display:flex;gap:14px;align-items:center;border:1.5px solid transparent;transition:all .15s}
  .hub-card:hover,.hub-card:active{border-color:var(--green);background:#F8FDF9}
  .hub-card .ico{font-size:30px;width:50px;height:50px;background:linear-gradient(135deg,#E8F5E9,#C8E6C9);
    border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .hub-card .title{font-weight:600;font-size:15px;color:var(--black);line-height:1.2}
  .hub-card .desc{font-size:12.5px;color:var(--g3);margin-top:3px;line-height:1.35}
  .hub-card .arr{color:var(--g3);font-size:18px}

  /* Emergency */
  .emergency{background:linear-gradient(160deg,#B71C1C,#7F0000);color:#fff;position:absolute;inset:0;z-index:20;
    padding:30px 22px;display:flex;flex-direction:column;align-items:center;text-align:center;animation:in .3s ease}
  .emergency .icon{font-size:64px;margin:30px 0 14px}
  .emergency h1{color:#fff;font-size:26px}
  .emergency p{font-size:15px;line-height:1.5;opacity:.95}
  .emergency .phone{font-size:34px;font-weight:700;margin:18px 0;letter-spacing:1px}

  /* Dashboard */
  .dash-card{background:#fff;border-radius:18px;padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow);position:relative}
  .gauge-wrap{position:relative;width:200px;height:200px;margin:6px auto 8px}
  .gauge-value{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
  .gauge-num{font-size:42px;font-weight:700;line-height:1}
  .gauge-lbl{font-size:12px;color:var(--g3);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
  .chart-box{position:relative;height:240px}
  .chart-box.small{height:180px}
  .insight{padding:11px 12px;background:#F2FAF4;border-radius:12px;font-size:13.5px;margin-bottom:8px;border-left:3px solid var(--green);line-height:1.45}
  .insight:last-child{margin-bottom:0}
  .risk-card{background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--g2)}
  .risk-card.persona{border-color:var(--green);background:#F8FDF9}
  .risk-card.persona .persona-tag{display:inline-block;font-size:10.5px;font-weight:600;color:var(--green-d);background:#E8F5E9;padding:2px 8px;border-radius:8px;margin-top:5px}
  .risk-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:10px}
  .risk-title{font-weight:600;font-size:14px;flex:1;display:flex;align-items:center;gap:8px}
  .risk-dot{width:10px;height:10px;border-radius:50%;background:#FFA726;flex-shrink:0}
  .risk-dot.high{background:#E53935}.risk-dot.low{background:#FFD54F}
  .risk-toggle{font-size:12px;color:var(--green-d);font-weight:500;white-space:nowrap}
  .risk-body{display:none;padding-top:10px;margin-top:10px;border-top:1px solid var(--g1);font-size:13.5px;color:var(--g4);line-height:1.5}
  .risk-card.open .risk-body{display:block}
  .risk-card.open .risk-toggle::after{content:" ▲"}
  .risk-card:not(.open) .risk-toggle::after{content:" ▼"}
  .rec-card{background:linear-gradient(135deg,#F2FAF4,#fff);border-radius:14px;padding:12px 14px;margin-bottom:8px;border-left:3px solid var(--green);font-size:13.5px;line-height:1.5}
  .rec-card b{color:var(--green-d)}
  .dash-skeleton{filter:saturate(.3) opacity(.45);pointer-events:none}
  .skeleton-overlay{position:absolute;inset:10px 14px;background:rgba(255,255,255,.78);backdrop-filter:blur(2px);
    border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--g4);
    font-weight:500;text-align:center;padding:14px;line-height:1.4}
  /* Skeleton зона внутри карточки: заголовок виден, плашка только над телом */
  .skeleton-zone{position:relative;margin-top:6px;border-radius:12px;overflow:hidden;min-height:120px}
  .skeleton-overlay-inside{position:absolute;inset:0;background:rgba(255,255,255,.82);backdrop-filter:blur(2px);
    display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--g4);
    font-weight:500;text-align:center;padding:14px;line-height:1.4;border-radius:12px}

  /* Plan chain */
  .plan-chain{display:flex;align-items:stretch;gap:6px;margin:14px 0 8px;overflow-x:auto;padding-bottom:4px}
  .plan-step{flex:1;min-width:80px;background:#fff;border-radius:14px;padding:10px 8px;text-align:center;
    border:1.5px solid var(--g2);cursor:pointer;font-size:12px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .15s}
  .plan-step.active{border-color:var(--green);background:#F2FAF4}
  .plan-step .num{width:26px;height:26px;border-radius:50%;background:var(--g1);color:var(--g4);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .plan-step.active .num{background:var(--green);color:#fff}
  .plan-detail{background:#fff;border-radius:14px;padding:14px;box-shadow:var(--shadow);font-size:13.5px;line-height:1.5}
  .plan-detail h3{margin-top:0;color:var(--green-d)}
  .plan-detail ul{margin:6px 0 0;padding-left:18px}
  .plan-detail li{margin-bottom:4px}

  /* Treatment scenario */
  .med-card{background:#fff;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);
    border-left:4px solid var(--green)}
  .med-card .top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .med-card .pill{font-size:24px;width:38px;height:38px;border-radius:10px;background:#F2FAF4;
    display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .med-card .name{font-weight:600;font-size:15px;line-height:1.2}
  .med-card .dose{color:var(--g4);font-size:13px;line-height:1.4;margin-top:4px}
  .med-card .meta{color:var(--g3);font-size:11.5px;margin-top:6px}
  .med-card .actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .med-card .actions .btn{padding:8px 12px;font-size:12.5px;border-radius:14px}
  .med-card.taken{background:#F2FAF4}
  .med-card.taken::after{content:"Принято сегодня ✓";display:inline-block;color:var(--green-d);font-size:11.5px;font-weight:600;margin-top:8px}

  /* Treatment plan vertical cards (правка 1) */
  .tp-card{background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:10px;border:1px solid var(--g2);position:relative;display:flex;gap:12px;align-items:flex-start}
  .tp-card.done{border-color:#A5D6A7;background:#F2FAF4}
  .tp-card.progress{border-color:#FFE0B2;background:#FFFAF0}
  .tp-card.pending{background:#FAFAFA}
  .tp-card .badge{flex-shrink:0;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;background:#fff;border:1.5px solid currentColor}
  .tp-card.done .badge{color:#21A038}
  .tp-card.progress .badge{color:#F57C00}
  .tp-card.pending .badge{color:#8E8E93}
  .tp-card.completed{border-color:#A5D6A7;background:#F2FAF4}
  .tp-card.completed .badge{color:#21A038}
  .tp-body{flex:1;min-width:0}
  .tp-status{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
  .tp-card.done .tp-status,.tp-card.completed .tp-status{color:#21A038}
  .tp-card.progress .tp-status{color:#F57C00}
  .tp-card.pending .tp-status{color:#8E8E93}
  .tp-title{font-weight:600;font-size:14.5px;line-height:1.25;color:var(--black)}
  .tp-desc{font-size:13px;color:var(--g4);margin-top:4px;line-height:1.45}
  .tp-card .book-btn{margin-top:10px;padding:8px 14px;font-size:12.5px;border-radius:14px;background:linear-gradient(135deg,#21A038,#00833E);color:#fff;border:none;cursor:pointer;font-family:inherit;font-weight:500;box-shadow:0 1px 4px rgba(33,160,56,.25)}
  .tp-line{position:absolute;left:32px;top:48px;bottom:-10px;width:2px;background:var(--g2);z-index:0}
  .tp-card:last-child .tp-line{display:none}
  /* Не входит в программу ДМС (правка 1) */
  .tp-card.out{border:2px solid #F5A623;background:#FFFCF5}
  .tp-card.out .badge{color:#D97706;border-color:#F5A623}
  .tp-card.out .tp-status{color:#D97706}
  .out-badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px;background:#FFF8E1;color:#D97706;margin:2px 0 6px;line-height:1.2}
  .out-note{font-size:12.5px;color:var(--g4);background:#FFF8E1;border-left:3px solid #F5A623;padding:8px 10px;border-radius:8px;margin-top:6px;line-height:1.4}
  .tp-card.out .book-btn{background:linear-gradient(135deg,#F5A623,#D97706);box-shadow:0 1px 4px rgba(245,166,35,.25)}

  /* Платные врачи (правка 2) */
  .doctor-card{background:#fff;border:1px solid var(--g2);border-radius:16px;padding:14px;margin-bottom:10px}
  .doctor-card .name{font-weight:600;font-size:15px;line-height:1.25}
  .doctor-card .spec{font-size:12.5px;color:var(--green-d);font-weight:500;margin:3px 0 6px}
  .doctor-card .exp{font-size:13px;color:var(--g4);line-height:1.4;margin-bottom:8px}
  .doctor-card .meta{display:flex;gap:10px;flex-wrap:wrap;font-size:12.5px;color:var(--g3);margin-bottom:8px}
  .doctor-card .meta b{color:var(--black)}
  .doctor-card .price{font-weight:700;font-size:15px;color:#D97706}
  .doctor-card .row{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .doctor-card .btn{padding:8px 14px;font-size:13px;border-radius:16px}

  /* Аптеки (правка 3) */
  .pharm-card{background:#fff;border:1px solid var(--g2);border-radius:14px;padding:12px 14px;margin-bottom:10px}
  .pharm-card .name{font-weight:600;font-size:14.5px}
  .pharm-card .addr{font-size:12.5px;color:var(--g3);margin-top:2px}
  .pharm-card .stock{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--green-d);font-weight:600;margin-top:6px}
  .pharm-card .stock::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--green)}
  .pharm-card .price{font-weight:700;font-size:16px;color:var(--black);margin-top:6px}
  .med-pick{background:#fff;border:1.5px solid var(--g2);border-radius:14px;padding:12px 14px;cursor:pointer;font-family:inherit;font-size:14.5px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;width:100%;text-align:left}
  .med-pick:hover{border-color:var(--green);background:#F8FDF9}
  .med-pick .arr{color:var(--g3);font-size:18px}
  .delivery-banner{background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border-radius:16px;padding:18px;font-size:14.5px;line-height:1.5;text-align:center}
  .delivery-banner .ico{font-size:46px;margin-bottom:8px}
  .delivery-banner b{display:block;font-size:16px;color:var(--green-d);margin-bottom:4px}

  /* Loader */
  .loader-overlay{position:absolute;inset:0;background:rgba(255,255,255,.92);z-index:15;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:20px;text-align:center}
  .spinner{width:54px;height:54px;border:4px solid var(--g2);border-top-color:var(--green);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loader-text{font-size:14px;color:var(--g4);max-width:240px}

  /* Slots */
  .slot{background:#fff;border:1.5px solid var(--g2);border-radius:14px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:14px}
  .slot.sel{border-color:var(--green);background:#F2FAF4}
  .toast{position:absolute;left:50%;bottom:90px;transform:translateX(-50%);background:#1A1A1A;color:#fff;padding:10px 16px;border-radius:20px;font-size:13px;z-index:30;box-shadow:var(--shadow-2);animation:in .3s ease}

  /* Diagnosis */
  .diag-bars{display:flex;flex-direction:column;gap:10px;margin:10px 0 6px}
  .diag-bar{cursor:pointer;user-select:none}
  .diag-bar-row{display:flex;align-items:center;gap:10px;font-size:13.5px;margin-bottom:4px}
  .diag-bar-row .nm{flex:1;font-weight:500;color:var(--black);line-height:1.25}
  .diag-bar-row .pct{font-weight:700;color:var(--green-d);min-width:38px;text-align:right}
  .diag-bar-track{height:14px;background:#F0F0F0;border-radius:8px;overflow:hidden;position:relative}
  .diag-bar-fill{height:100%;background:linear-gradient(90deg,#21A038,#00833E);border-radius:8px;transition:width .6s ease}
  .diag-bar-fill.alt{background:linear-gradient(90deg,#4CAF50,#21A038);opacity:.75}
  .diag-bar-fill.alt2{background:linear-gradient(90deg,#A5D6A7,#66BB6A);opacity:.6}
  .diag-card{background:#fff;border:1px solid var(--g2);border-radius:14px;padding:12px 14px;margin-bottom:8px;transition:all .2s}
  .diag-card.open{box-shadow:var(--shadow-2);border-color:var(--green)}
  .diag-card-head{display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer}
  .diag-card-title{font-weight:600;font-size:14.5px;flex:1;line-height:1.3}
  .diag-card-toggle{font-size:12px;color:var(--green-d);font-weight:500;white-space:nowrap}
  .diag-card.open .diag-card-toggle::after{content:" ▲"}
  .diag-card:not(.open) .diag-card-toggle::after{content:" ▼"}
  .diag-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px;margin-top:6px;line-height:1}
  .diag-badge::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.9}
  .diag-badge.green{background:#E8F5E9;color:#1B5E20}
  .diag-badge.yellow{background:#FFF8E1;color:#8A5A00}
  .diag-badge.orange{background:#FFE9D6;color:#B7470B}
  .diag-body{display:none;padding-top:10px;margin-top:10px;border-top:1px solid var(--g1);font-size:13.5px;color:var(--g4);line-height:1.5}
  .diag-card.open .diag-body{display:block}
  .diag-section{margin-top:10px}
  .diag-section h4{font-size:12.5px;font-weight:600;color:var(--black);margin:0 0 4px;text-transform:uppercase;letter-spacing:.3px}
  .diag-section.warn h4{color:#B7470B}
  .diag-note{font-size:12px;color:var(--g3);text-align:center;margin:8px 0 2px;font-style:italic}

  /* Clinic cards */
  .clinic-card{background:#fff;border:1px solid var(--g2);border-radius:16px;padding:14px;margin-bottom:10px;display:flex;flex-direction:column;gap:6px}
  .clinic-name{font-weight:600;font-size:15px}
  .clinic-meta{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--g3);flex-wrap:wrap}
  .clinic-rating{display:flex;align-items:center;gap:4px;color:#FF9800;font-weight:600}
  .clinic-rating .stars{color:#FFC107;letter-spacing:1px}
  .clinic-rating .reviews{color:var(--g3);font-weight:400;font-size:11.5px;margin-left:2px}
  .clinic-card .btn{margin-top:6px;padding:9px 14px;font-size:13.5px;border-radius:18px}

  /* Time slots compact */
  .slot-btn{background:#fff;border:1.5px solid var(--g2);border-radius:14px;padding:12px 14px;cursor:pointer;font-family:inherit;font-size:14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;transition:all .15s}
  .slot-btn.sel{border-color:var(--green);background:#F2FAF4}
  .slot-btn b{color:var(--black)}

  /* Back link */
  .back-link{background:none;border:none;color:var(--green-d);font-size:13px;cursor:pointer;padding:4px 0;margin-bottom:8px;font-family:inherit}
  .back-mini{background:#fff;border:1px solid var(--g2);color:var(--g4);border-radius:14px;padding:6px 12px;font-size:12.5px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:4px}
  .back-mini:hover{border-color:var(--green);color:var(--green-d)}

  /* EHR spoiler */
  .ehr-spoiler{border:1px solid var(--g2);border-radius:14px;overflow:hidden;margin-bottom:12px;background:#fff}
  .ehr-head{background:#F5F5F5;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;transition:background .15s}
  .ehr-head:hover,.ehr-head:active{background:#EBEBEB}
  .ehr-head-text{flex:1;min-width:0}
  .ehr-head-title{font-weight:600;font-size:14.5px;line-height:1.2}
  .ehr-head-sub{font-size:12px;color:var(--g3);margin-top:2px}
  .ehr-arrow{font-size:14px;color:var(--g3);transition:transform .3s ease;flex-shrink:0}
  .ehr-spoiler.open .ehr-arrow{transform:rotate(180deg)}
  .ehr-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
  .ehr-spoiler.open .ehr-body{max-height:2400px}
  .ehr-body-inner{padding:12px;display:flex;flex-direction:column;gap:10px}
  .ehr-note{font-size:12.5px;color:var(--g4);background:#F2FAF4;border-left:3px solid var(--green);padding:9px 11px;border-radius:8px;line-height:1.45}
  .ehr-card{background:#fff;border:1px solid var(--g2);border-radius:12px;padding:11px 13px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  .ehr-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:12px;color:var(--g3)}
  .ehr-card-type{font-weight:600;color:var(--g4)}
  .ehr-card-summary{font-size:13.5px;color:var(--black);line-height:1.5;margin:4px 0 8px}
  .ehr-card-foot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;font-size:12px;color:var(--g3)}
  .ehr-status{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:10px;line-height:1}
  .ehr-status::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
  .ehr-status.green {background:#E8F5E9;color:#21A038}
  .ehr-status.yellow{background:#FFF8E1;color:#F57C00}
  .ehr-status.gray  {background:#F5F5F5;color:#8E8E93}

  @media (max-width:380px){
    .gauge-wrap{width:170px;height:170px}.gauge-num{font-size:36px}
    .plan-step{min-width:70px;font-size:11px}
    .hub-card .ico{width:44px;height:44px;font-size:26px}
  }
</style>
</head>

/* Препараты строго от текущего визита — без подмеса лекарств от хронической болезни */
function getVisitMedications(p){
  const meds=new Set();
  const fromVisit=buildTreatmentForVisit(p.visit1, p.disease)||[];
  fromVisit.forEach(m=>{
    if(!m.name) return;
    if(m.name.indexOf("Контроль")>=0) return;
    if(m.name.indexOf("Курс ЛФК")>=0) return;
    if(m.name.indexOf("Диета")===0) return;
    if(m.name.indexOf("Препарат по назначению")>=0) return;
    meds.add(m.name);
  });
  if(p.visit1 && p.visit1.result==="Поставлен диагноз, назначено лечение"){
    meds.add("Мелоксикам 15 мг");
  }
  return [...meds];
}
/* Препараты поддерживающей терапии — строго от хронического заболевания */
function getMaintenanceMedications(p){
  return [...(MEDICATIONS_BY_DISEASE[p.disease]||[])];
}
/* Все активные препараты (визит + поддержка), без дублей */
function getAllMedications(p){
  const set=new Set(getVisitMedications(p));
  getMaintenanceMedications(p).forEach(n=>set.add(n));
  return [...set];
}
/* Совместимость с прежним именем */
function getPersonaMedications(p){ return getVisitMedications(p) }

/* Активные назначения по результату конкретного визита и болезни */
function buildTreatmentForVisit(visit, disease){
  const r = visit && visit.result;
  const d = disease;
  if(!r) return null;
  /* Прямые соответствия по результату */
  if(r==="Выявлен дефицит витамина D, назначен приём"){
    return [{name:"Витамин D 5000 МЕ",dose:"1 раз в день с едой",meta:"Курс: 2 месяца",pill:"💊"}];
  }
  if(r==="Осложнение (бронхит), назначен курс антибиотиков"){
    return [
      {name:"Амоксиклав 875+125 мг",dose:"2 раза в день, 7 дней",meta:"Антибиотик",pill:"💊"},
      {name:"АЦЦ 600 мг",dose:"1 раз в день",meta:"Муколитик",pill:"🧃"},
    ];
  }
  if(r==="Выявлено повышенное давление, направление к кардиологу"){
    return [{name:"Контроль АД",dose:"Утром и вечером, дневник",meta:"До приёма кардиолога",pill:"📏"}];
  }
  if(r==="Направление к неврологу, назначено лечение"){
    return [
      {name:"Мидокалм 150 мг",dose:"3 раза в день, 10 дней",meta:"Миорелаксант",pill:"💊"},
      {name:"Курс ЛФК",dose:"2 раза в неделю, 6 недель",meta:"По направлению невролога",pill:"🧘"},
    ];
  }
  if(r==="Назначена диета и препараты"){
    if(d==="Хронический гастрит") return [
      {name:"Омепразол 20 мг",dose:"1 капсула утром натощак",meta:"Снижение кислотности",pill:"💊"},
      {name:"Диета стол №1",dose:"Дробное питание 5 раз/день",meta:"Щадящая диета",pill:"🥣"},
    ];
    return [
      {name:"Препараты по схеме",dose:"Согласно назначению",meta:"См. рецепт",pill:"💊"},
      {name:"Диета",dose:"Согласно рекомендациям врача",meta:"Питание",pill:"🥣"},
    ];
  }
  if(r==="Назначено симптоматическое лечение, выздоровление") return null;
  if(r==="Всё в норме, рекомендован осмотр через год") return null;
  if(r==="Все показатели в норме") return null;

  /* «Скорректирована схема лечения / Назначен новый препарат» — лечение хроники */
  if(r==="Скорректирована схема лечения, назначены препараты" || r==="Назначен новый препарат и контрольный визит"){
    if(d==="Бронхиальная астма") return [
      {name:"Будесонид (ингалятор)",dose:"2 вдоха утром и вечером",meta:"Базовая терапия",pill:"🌬️"},
      {name:"Сальбутамол",dose:"По потребности при затруднении дыхания",meta:"Купирование приступа",pill:"💨"},
    ];
    if(d==="Гипертония") return [
      {name:"Эналаприл 10 мг",dose:"1 раз в день утром",meta:"Гипотензивное",pill:"💊"},
      {name:"Индапамид 2.5 мг",dose:"1 раз в день утром",meta:"Диуретик",pill:"💊"},
    ];
    if(d==="Сахарный диабет 2 типа") return [
      {name:"Метформин 1000 мг",dose:"2 раза в день с едой",meta:"Снижение сахара",pill:"💊"},
    ];
    if(d==="Хронический гастрит") return [
      {name:"Омепразол 20 мг",dose:"1 капсула утром натощак",meta:"Снижение кислотности",pill:"💊"},
      {name:"Гевискон",dose:"После еды и перед сном",meta:"Симптоматически",pill:"🧃"},
    ];
    if(d==="Сезонная аллергия") return [
      {name:"Цетиризин 10 мг",dose:"1 таблетка вечером",meta:"Антигистаминное",pill:"💊"},
      {name:"Назонекс спрей",dose:"По 1 впрыску в каждый носовой ход",meta:"Местно",pill:"💧"},
    ];
    return [{name:"Препарат по назначению",dose:"Согласно рецепту",meta:"См. рекомендации врача",pill:"💊"}];
  }
  /* Боль → обследование/лечение */
  if(r==="Назначено обследование (МРТ / УЗИ / рентген)") return [
    {name:"Ибупрофен 400 мг",dose:"При выраженной боли, не чаще 3 раз/сутки",meta:"Симптоматически",pill:"💊"},
  ];
  if(r==="Поставлен диагноз, назначено лечение") return [
    {name:"Мидокалм 150 мг",dose:"3 раза в день",meta:"Миорелаксант, курс 10 дней",pill:"💊"},
    {name:"Курс ЛФК",dose:"2 раза в неделю, 6 недель",meta:"Физиотерапия",pill:"🧘"},
  ];
  if(r==="Направление к узкому специалисту") return null;
  if(r==="Выявлены отклонения, рекомендована консультация") return null;
  return null;
}

let _stuckTimer=null;
function renderAnswers(){
  const a=document.getElementById("answers");if(!a)return;
  a.innerHTML="";
  if(_stuckTimer){clearTimeout(_stuckTimer);_stuckTimer=null}
  if(state.busy||!state.answers){
    if(state.chat.length>0){
      _stuckTimer=setTimeout(()=>{
        const cur=document.getElementById("answers");
        if(!cur||cur.childElementCount>0||state.busy||state.answers)return;
        const b=document.createElement("button");b.className="btn ghost";b.textContent="Вернуться в меню";
        b.onclick=()=>{goToHub()};
        cur.appendChild(b);
      },1800);
    }
    return;
  }
  state.answers.render(a);
}

function setSingleAnswers(opts,onPick,{onBack=null}={}){
  state.answers={
    render(c){
      if(onBack){
        const back=document.createElement("button");back.className="back-mini";back.textContent="← Назад";
        back.style.alignSelf="flex-start";back.style.marginBottom="2px";
        back.onclick=()=>{state.answers=null;renderAnswers();onBack()};
        c.appendChild(back);
      }
      opts.forEach(o=>{
        const b=document.createElement("button");
        b.className="btn ghost";b.textContent=typeof o==="string"?o:o.label;
        b.onclick=()=>{const val=typeof o==="string"?o:o.value;const lbl=typeof o==="string"?o:o.label;state.answers=null;renderAnswers();onPick(val,lbl)};
        c.appendChild(b);
      });
    }
  };
  renderAnswers();
}
function setMultiAnswers(opts,onSubmit,{soloIdx=null,safeIdx=null,onBack=null}={}){
  let sel=new Set();
  state.answers={
    render(c){
      if(onBack){
        const back=document.createElement("button");back.className="back-mini";back.textContent="← Назад";
        back.style.alignSelf="flex-start";back.style.marginBottom="2px";
        back.onclick=()=>{state.answers=null;renderAnswers();onBack()};
        c.appendChild(back);
      }
      opts.forEach((o,i)=>{
        const el=document.createElement("button");
        let cls="multi-opt"+(sel.has(i)?" sel":"");
        if(safeIdx!==null&&i===safeIdx&&!sel.has(i)) cls+=" safe";
        el.className=cls;el.textContent=o;
        el.onclick=()=>{
          if(soloIdx!==null&&i===soloIdx){
            if(sel.has(i)) sel.delete(i); else { sel.clear(); sel.add(i); }
          } else {
            if(soloIdx!==null&&sel.has(soloIdx)) sel.delete(soloIdx);
            if(sel.has(i)) sel.delete(i); else sel.add(i);
          }
          renderAnswers();
        };
        c.appendChild(el);
      });
      const btn=document.createElement("button");btn.className="btn";btn.textContent="Продолжить";
      if(sel.size===0) btn.disabled=true;
      btn.onclick=()=>{
        const arr=[...sel].sort((a,b)=>a-b).map(i=>({i,label:opts[i]}));
        state.answers=null;renderAnswers();onSubmit(arr);
      };
      c.appendChild(btn);
    }
  };
  renderAnswers();
}

/* Возвращает массив всех шагов конструктора в зависимости от текущего состояния */
function getPersonaQuestions(){
  const qs=[...PERSONA_QS_BASE];
  // если выбран "Более 3 лет" — больше вопросов нет
  if(state.persona.lastVisit && state.persona.lastVisit.startsWith("Более 3 лет")) return qs;
  // иначе один объединённый шаг: выбрать ровно 2 повода/результата
  if(state.persona.lastVisit){
    qs.push({
      key:"visits",
      q:"Ваши последние визиты к врачу",
      sub:"Выберите два повода — это будут ваши два последних обращения в клинику, о которых ЕВА будет знать.",
      multi:true,
      requireCount:2,
      opts:COMBINED_VISIT_OPTIONS.map(o=>o.label),
    });
  }
  return qs;
}

function renderPersonaQuestion(){
  const qs=getPersonaQuestions();
  const i=state.personaStep;
  if(i>=qs.length){
    state.screen="persona-summary";return render();
  }
  let q=qs[i];
  /* Согласование по полу: подставляем правильные окончания для вопроса о визите (правка 8) */
  if(q.key==="lastVisit" && state.persona.gender){
    const verb_was=gv("был","была");
    const verb_app=gv("обращался","обращалась");
    q={...q, q:`Когда последний раз ${verb_was} в клинике?`, opts:["Меньше месяца назад","2–6 месяцев назад","Около года назад","Более 3 лет не "+verb_app]};
  }
  setStep(i+1, qs.length);
  app.appendChild(header({title:"Конструктор персонажа"}));
  const wrap=document.createElement("div");wrap.className="screen-pad";
  const subTxt = q.sub || (q.multi ? `Выберите ${q.requireCount||"несколько"} варианта(ов)` : "Выберите один вариант");
  wrap.innerHTML=`
    <div class="persona-q">
      <h2>${q.q}</h2>
      <div class="sub">${subTxt}</div>
      <div id="popts"></div>
    </div>
  `;
  app.appendChild(wrap);
  const popts=wrap.querySelector("#popts");
  if(q.multi){
    /* мультиселект ровно из requireCount вариантов */
    const need = q.requireCount||2;
    const sel = new Set();
    q.opts.forEach((o,idx)=>{
      const b=document.createElement("button");b.className="multi-opt";b.style.marginBottom="8px";b.style.width="100%";
      b.textContent=o;
      b.onclick=()=>{
        if(sel.has(idx)) sel.delete(idx);
        else if(sel.size<need) sel.add(idx);
        else return; /* лимит достигнут */
        popts.querySelectorAll(".multi-opt").forEach((el,j)=>el.classList.toggle("sel",sel.has(j)));
        nextBtn.disabled = sel.size!==need;
        counter.textContent = `Выбрано ${sel.size} из ${need}`;
      };
      popts.appendChild(b);
    });
    const counter=document.createElement("div");
    counter.style.cssText="font-size:12px;color:var(--g3);margin:6px 0 10px;text-align:center";
    counter.textContent=`Выбрано 0 из ${need}`;
    popts.appendChild(counter);
    const nextBtn=document.createElement("button");
    nextBtn.className="btn";nextBtn.textContent="Далее";nextBtn.disabled=true;nextBtn.style.width="100%";
    nextBtn.onclick=()=>{
      const picks=[...sel].sort((a,b)=>a-b);
      handlePersonaAnswer(q.key, picks);
    };
    popts.appendChild(nextBtn);
  } else {
    q.opts.forEach(o=>{
      const b=document.createElement("button");b.className="btn ghost";b.style.marginBottom="8px";b.style.width="100%";
      b.textContent=o;
      b.onclick=()=>handlePersonaAnswer(q.key,o);
      popts.appendChild(b);
    });
  }
  app.appendChild(footerNote());
}

function personaVisitDate(persona, which){
  const base = persona.lastVisit;
  let daysAgo1 = 14;
  if(base==="2–6 месяцев назад") daysAgo1=95;
  else if(base==="Около года назад") daysAgo1=370;
  else if(base==="Меньше месяца назад") daysAgo1=14;
  if(which===1) return fmtDate(addDays(TODAY,-daysAgo1));
  return fmtDate(addDays(TODAY,-(daysAgo1+rand(180,240))));
}

function handlePersonaAnswer(key,val){
  pushNav();
  const p=state.persona;
  if(["gender","age","work","disease","lastVisit"].indexOf(key)>=0){
    p[key]=val;
  }
  if(key==="lastVisit"){
    if(val && val.startsWith("Более 3 лет")) p.noVisits=true;
    else p.noVisits=false;
  }
  if(key==="visits" && Array.isArray(val) && val.length===2){
    /* val — массив индексов в COMBINED_VISIT_OPTIONS, первый = свежее визита */
    const o1=COMBINED_VISIT_OPTIONS[val[0]];
    const o2=COMBINED_VISIT_OPTIONS[val[1]];
    p.visit1={reason:o1.reason, result:o1.result, label:o1.label, date:personaVisitDate(p,1)};
    p.visit2={reason:o2.reason, result:o2.result, label:o2.label, date:personaVisitDate(p,2)};
  }
  state.personaStep++;
  render();
}

/* Значимый визит (правка 2) — любой, кроме «всё в норме» и «выздоровление ОРВИ». */
function isSignificantVisit(v){
  if(!v) return false;
  const r=v.result;
  if(r==="Всё в норме, рекомендован осмотр через год") return false;
  if(r==="Назначено симптоматическое лечение, выздоровление") return false;
  return true;
}
function getSignificantVisit(p){
  if(isSignificantVisit(p.visit1)) return p.visit1;
  if(isSignificantVisit(p.visit2)) return p.visit2;
  return null;
}
function hasChronicDisease(){
  return state.persona.disease && state.persona.disease!=="Нет хронических заболеваний";
}

async function branchB_localize(){
  /* Правка 2: промежуточный вопрос о связи симптомов с историей */
  const sig = getSignificantVisit(state.persona);
  const hasChr = hasChronicDisease();
  if(!state.historyAsked && (hasChr || sig)){
    return askHistoryConnectionQuestion(sig, hasChr);
  }
  await evaSay("Хорошо. Где ты чувствуешь дискомфорт?");
  showLocalizeOptions();
}

/* Резолв ветки симптом-чекера из контекста персонажа (правка: пропуск выбора локализации) */
const RESULT_TO_BRANCH = {
  "Поставлен диагноз, назначено лечение":             "back",
  "Направление к неврологу, назначено лечение":       "head",
  "Выявлено повышенное давление, направление к кардиологу":"head",
  "Выявлен дефицит витамина D, назначен приём":       "general",
  "Назначена диета и препараты":                      "abdomen",
  "Скорректирована схема лечения, назначены препараты":null, /* fallback: по болезни */
  "Назначен новый препарат и контрольный визит":      null,
};
const DISEASE_TO_BRANCH = {
  "Бронхиальная астма":     "chest",
  "Гипертония":             "head",
  "Сезонная аллергия":      "ent",
  "Сахарный диабет 2 типа": "general",
  "Хронический гастрит":    "abdomen",
};
const HISTORY_CONFIRM_BRANCH = {
  back:    "Понятно, значит снова беспокоит спина. Давай уточню детали.",
  head:    "Поняла, голова снова даёт о себе знать. Уточню несколько моментов.",
  ent:     "Ясно, опять верхние дыхательные пути — давай посмотрим, что сейчас.",
  abdomen: "Поняла, опять желудок. Уточню несколько моментов.",
  chest:   "Ясно, грудь и дыхание — давай посмотрим, что сейчас.",
  general: "Поняла, общее самочувствие. Уточню несколько моментов.",
};
const HISTORY_CONFIRM_DISEASE = {
  "Бронхиальная астма":     "Ясно, это по твоей астме — посмотрим, что с дыханием.",
  "Гипертония":             "Понятно, давление снова даёт о себе знать. Уточню детали.",
  "Сезонная аллергия":      "Ясно, это похоже на твою аллергию — давай посмотрим.",
  "Сахарный диабет 2 типа": "Поняла, это связано с диабетом. Уточню несколько моментов.",
  "Хронический гастрит":    "Поняла, опять желудок. Уточню несколько моментов.",
};
function resolveBranchForHistory(answer, priorVisit, disease){
  if(answer==="chronic") return DISEASE_TO_BRANCH[disease] || null;
  if(answer==="prior" && priorVisit){
    let k = RESULT_TO_BRANCH[priorVisit.result];
    if(k===null || k===undefined){
      /* неоднозначно — по болезни */
      k = DISEASE_TO_BRANCH[disease] || null;
    }
    return k;
  }
  return null;
}
function historyConfirmPhrase(branchKey, answer, disease){
  if(answer==="chronic" && HISTORY_CONFIRM_DISEASE[disease]) return HISTORY_CONFIRM_DISEASE[disease];
  return HISTORY_CONFIRM_BRANCH[branchKey] || "Поняла, давай уточню детали.";
}

async function askHistoryConnectionQuestion(sig, hasChr){
  state.historyAsked = true;
  const p=state.persona;
  const diseaseLow = hasChr ? DISEASE_RULES[p.disease].short : null;
  let lead;
  if(hasChr && sig) lead = `У тебя ${diseaseLow}, и недавно было обращение по поводу: «${sig.reason}».`;
  else if(hasChr)   lead = `У тебя ${diseaseLow}.`;
  else              lead = `Недавно у тебя было обращение по поводу: «${sig.reason}».`;
  await evaSay("Прежде чем продолжить — твои симптомы как-то связаны с тем, что уже беспокоило?");
  await evaSay(lead);

  const opts=[];
  if(hasChr) opts.push({label:"Да, это про мою хроническую проблему", value:"chronic"});
  if(sig)    opts.push({label:"Да, похоже на прошлое обращение",       value:"prior"});
  opts.push({label:"Нет, это что-то новое", value:"new"});

  setSingleAnswers(opts, async (val,lbl)=>{
    userSay(lbl);
    state.historyAnswer = val;
    if(val==="new"){
      await evaSay("Хорошо. Тогда не будем привязываться к прошлому — давай посмотрим, что сейчас.");
      await evaSay("Где ты чувствуешь дискомфорт?");
      showLocalizeOptions();
      return;
    }
    /* chronic / prior — выбираем визит с лечением для уточнения о прохождении */
    let visit=null;
    if(val==="prior" && sig) visit=sig;
    else {
      /* chronic — приоритет визиту с лечением, относящимся к болезни */
      if(state.persona.visit1 && buildTreatmentForVisit(state.persona.visit1, state.persona.disease)) visit=state.persona.visit1;
      else if(state.persona.visit2 && buildTreatmentForVisit(state.persona.visit2, state.persona.disease)) visit=state.persona.visit2;
      else visit=sig||state.persona.visit1||state.persona.visit2;
    }
    /* Резолвим зону автоматически: для chronic — по болезни, для prior — по результату визита */
    const resolved = resolveBranchForHistory(val, val==="prior"?sig:null, state.persona.disease);
    const goToZone = async ()=>{
      if(resolved){
        await evaSay(historyConfirmPhrase(resolved, val, state.persona.disease));
        state.branchKey = resolved;
        state.branchAnswers = [];
        state.branchStep = 0;
        state.diseaseFollowUpAsked = false;
        state.diseaseFollowUpYes = false;
        askBranchB(0);
      } else {
        /* Резолв не сработал — fallback к обычному выбору локализации */
        await evaSay("Где ты чувствуешь дискомфорт?");
        showLocalizeOptions();
      }
    };
    if(visit){
      await askPreviousTreatmentInline(visit, goToZone);
    } else {
      await goToZone();
    }
  });
}

/* Универсальная ветка «прошёл ли назначенное лечение» — используется и из
   промежуточного вопроса (новая правка), и из diagIntro (предыдущая правка). */
async function askPreviousTreatmentInline(visit, onContinue){
  state.previousTreatmentVisit = visit;
  const treatment = buildTreatmentForVisit(visit, state.persona.disease);
  const list = (treatment||[]).map(t=>t.name).join(", ");
  if(list){
    await evaSay(`Подробнее из карты: ${detailedResult(visit.result)}\nКонкретно тогда назначили: ${list}.\nТы ${gv("прошёл","прошла")} это лечение?`);
  } else {
    await evaSay(`Подробнее из карты: ${detailedResult(visit.result)}\nТы ${gv("прошёл","прошла")} назначенное тогда лечение?`);
  }
  setSingleAnswers([
    {label:`Да, ${gv("прошёл","прошла")} полностью`, value:"completed"},
    {label:`${gv("Начал","Начала")}, но ${gv("бросил","бросила")}`, value:"partial"},
    {label:`Нет, не ${gv("выполнял","выполняла")}`, value:"skipped"},
  ], async (val,lbl)=>{
    userSay(lbl);
    state.previousTreatmentStatus = val;
    if(val==="completed"){
      await evaSay(`Хорошо, что ${gv("довёл","довела")} лечение до конца. Тогда нынешние симптомы могут быть новым эпизодом — давай разберёмся, что происходит сейчас.`);
    } else if(val==="partial"){
      await evaSay("Понятно. Незаконченное лечение — частая причина, по которой проблема возвращается. Давай посмотрим, что сейчас, и решим, нужно ли вернуться к прежней схеме или скорректировать её.");
    } else {
      await evaSay("Бывает. Тогда есть вероятность, что мы имеем дело с той же проблемой, что и в прошлый раз. Уточню несколько деталей, чтобы понять, изменилось ли что-то.");
    }
    onContinue();
  });
}
function showLocalizeOptions(){
  setSingleAnswers(LOCALIZE_MAP.map(m=>({label:m.emoji+" "+m.label,value:m.key})), (val,lbl)=>{
    state.branchKey=val;state.branchAnswers=[];state.branchStep=0;state.diseaseFollowUpAsked=false;state.diseaseFollowUpYes=false;
    userSay(lbl);
    askBranchB(0);
  },{onBack:()=>{popChat(2);state.triage=[];branchB_showTriage()}});
}
/* Карта: «стандартный вопрос ветки уже покрывает контекст заболевания» (правка 7).
   Ключ — branchKey + "_" + disease. Если совпадение есть — не задаём дублирующий follow-up,
   только эмитим короткий контекстный комментарий-lead-in, чтобы пользователь видел,
   что ЕВА учла его хронику. */
const STD_Q_COVERS_DISEASE = {
  "abdomen_Хронический гастрит":{coverIdx:1, leadIn:"При твоём гастрите связь боли с приёмом пищи особенно важна — сейчас уточню это вопросом ниже."},
};
async function askBranchB(i){
  const br=BRANCHES[state.branchKey];
  const rule=DISEASE_RULES[state.persona.disease];
  const coverKey=state.branchKey+"_"+state.persona.disease;
  const coverage=STD_Q_COVERS_DISEASE[coverKey];
  /* Если стандартный вопрос покрывает тему — подавляем follow-up, эмитим только lead-in */
  if(i===1 && coverage && !state.diseaseFollowUpAsked){
    state.diseaseFollowUpAsked=true;
    await evaSay(coverage.leadIn);
    /* fall through к стандартному Q[1] */
  }
  /* Disease-aware follow-up: задаём после первого вопроса ветки, если локализация подходит */
  if(i===1 && !state.diseaseFollowUpAsked && rule.followUpQ && rule.locales.indexOf(state.branchKey)>=0){
    state.diseaseFollowUpAsked=true;
    setStep(null);
    await evaSay(rule.followUpQ);
    return setSingleAnswers(["Да","Нет"], async (val,lbl)=>{
      state.diseaseFollowUpYes = (val==="Да");
      userSay(lbl);
      if(state.diseaseFollowUpYes && rule.followUpYesNote){
        await evaSay(rule.followUpYesNote);
      }
      askBranchB(i);
    },{onBack:()=>{
      popChat(1); state.diseaseFollowUpAsked=false;
      state.branchAnswers.pop(); popChat(2);
      askBranchB(i-1);
    }});
  }
  if(i>=br.questions.length){ setStep(null); return branchB_diagnosisIntro(); }
  setStep(i+1,br.questions.length);
  const q=br.questions[i];
  await evaSay(q.q);
  /* Если зона определена автоматически (история подтверждена) — на Q[0] нет осмысленного «Назад»:
     возвращаться к экрану локализации некорректно, ведь его не было. Прячем кнопку. */
  const autoResolved = state.historyAnswer && state.historyAnswer!=="new";
  const onBack = (i===0 && autoResolved) ? null : (()=>{
    if(i===0){
      popChat(2);state.branchKey=null;state.branchAnswers=[];setStep(null);showLocalizeOptions();
    } else {
      popChat(2);state.branchAnswers.pop();popChat(1);askBranchB(i-1);
    }
  });
  setSingleAnswers(q.opts,(val,lbl)=>{
    state.branchAnswers.push(lbl);userSay(lbl);askBranchB(i+1);
  },{onBack});
}

/* Проверка совпадения текущей локализации с поводом одного из визитов персонажа */
function findMatchingVisit(){
  const p=state.persona;
  if(p.noVisits) return null;
  const loc=state.branchKey;
  // карта соответствия локализация → ключи поводов визитов
  const map={
    head:["Боль (спина / голова / живот)","ОРВИ или грипп"],
    ent:["ОРВИ или грипп"],
    chest:["ОРВИ или грипп","Боль (спина / голова / живот)"],
    abdomen:["Боль (спина / голова / живот)","Обострение хронического заболевания"],
    back:["Боль (спина / голова / живот)"],
    general:["Обострение хронического заболевания","Сдача анализов"],
  };
  const reasons=map[loc]||[];
  for(const v of [p.visit1,p.visit2]){
    if(!v) continue;
    if(reasons.indexOf(v.reason)>=0) return v;
  }
  return null;
}

/* Специалист для рекомендации возврата (правка 2). Берётся из результата визита,
   с откатом на профильного врача по болезни персонажа. */
function specialistFromVisit(visit, disease){
  const r=(visit&&visit.result)||"";
  if(/кардиолог/i.test(r))  return "кардиологу";
  if(/неврологу/i.test(r))  return "неврологу";
  if(/витамина D|дефицит/i.test(r)) return "терапевту";
  if(/бронхит|ОРВИ/i.test(r))      return "терапевту";
  if(/диета/i.test(r))             return "гастроэнтерологу";
  if(/давлен/i.test(r))            return "кардиологу";
  if(disease && disease!=="Нет хронических заболеваний") return DISEASE_RULES[disease].specialistDat;
  return "терапевту";
}

async function branchB_diagnosisIntro(){
  state.diagIntroStartLen=state.chat.length;

  /* Если промежуточный вопрос о связи с историей УЖЕ был задан в начале сценария —
     прошлый визит и лечение уже обсудили, повторно не упоминаем (правка 2). */
  if(state.historyAsked){
    return askEhrQuestion();
  }

  /* Иначе — старое поведение: при совпадении локализации с поводом визита, упомянуть его. */
  state.previousTreatmentStatus=null;
  state.previousTreatmentVisit=null;
  const m=findMatchingVisit();
  if(m){
    let phrase="";
    const verb = gv("обращался","обращалась");
    if(m.reason==="ОРВИ или грипп") phrase=`Кстати, ${m.date} ты уже ${verb} с похожими симптомами — тогда это была ОРВИ. В этот раз картина похожая, давай посмотрим.`;
    else if(m.reason==="Боль (спина / голова / живот)") phrase=`${m.date} у тебя уже была боль в этой зоне. Запись из карты: «${detailedResult(m.result)}»`;
    else phrase=`${m.date} ты уже ${verb} — «${m.reason}». Запись: «${detailedResult(m.result)}»`;
    await evaSay(phrase);

    /* Уточнение о прошлом лечении, если есть назначения */
    const treatment = buildTreatmentForVisit(m, state.persona.disease);
    if(treatment && treatment.length){
      return askPreviousTreatmentInline(m, ()=>askEhrQuestion());
    }
  }
  askEhrQuestion();
}

/* Откат всей секции диалога после последнего стандартного Q ветки (правка 2) */
function rewindDiagIntro(){
  state.chat.length = Math.max(0, state.diagIntroStartLen - 2);
  state.previousTreatmentStatus=null;
  state.previousTreatmentVisit=null;
  state.branchAnswers.pop();
  renderChat();
  const br=BRANCHES[state.branchKey];
  askBranchB(br.questions.length-1);
}

}

async function askHealthQuestion(i){
  if(i>=HEALTH_QUESTIONS.length){
    setStep(null);
    await showLoader("Анализирую твои данные…",3000);
    state.healthFilled=true;
    state.screen="health-dashboard";render();
    return;
  }
  setStep(i+1,HEALTH_QUESTIONS.length);
  const q=HEALTH_QUESTIONS[i];
  await evaSay(q.q);
  const onBack = i>0 ? ()=>{
    popChat(2);
    const prev=HEALTH_QUESTIONS[i-1];
    delete state.healthProfile[prev.key];
    popChat(1);
    askHealthQuestion(i-1);
  } : null;
  setSingleAnswers(q.opts,(val,lbl)=>{
    state.healthProfile[q.key]=lbl;userSay(lbl);askHealthQuestion(i+1);
  },{onBack});
}

function computeHealthScore(){
  let s=100;const p=state.healthProfile;
  if(p.sleep==="<6 часов") s-=12; else if(p.sleep==="6–7 часов") s-=5;
  if(p.steps==="<3000") s-=15; else if(p.steps==="3000–6000") s-=7;
  if(p.smoke==="Регулярно") s-=20; else if(p.smoke==="Иногда") s-=8;
  if(p.stress==="Высокий") s-=12; else if(p.stress==="Умеренный") s-=4;
  if(p.diet==="Редко") s-=10;
  if(p.sport==="Не занимаюсь") s-=8;
  /* модификатор от хроники */
  if(state.persona.disease!=="Нет хронических заболеваний") s-=9;
  return Math.max(5,Math.min(100,s));
}
function radarValuesHealth(){
  const p=state.healthProfile;
  const sleepRisk={"<6 часов":9,"6–7 часов":6,"7–8 часов":1,">8 часов":4}[p.sleep]||5;
  const stepsRisk={"<3000":9,"3000–6000":6,"6000–10000":2,">10000":1}[p.steps]||5;
  const sportRisk={"Не занимаюсь":9,"1–2 раза в неделю":4,"3+ раз в неделю":1}[p.sport]||5;
  const activityRisk=Math.round((stepsRisk+sportRisk)/2);
  const dietRisk={"Ежедневно":1,"Иногда":4,"Редко":8}[p.diet]||5;
  const stressRisk={"Низкий":1,"Умеренный":5,"Высокий":9}[p.stress]||5;
  const smokeRisk={"Нет":1,"Иногда":6,"Регулярно":9}[p.smoke]||3;
  /* фактор «заболевание» добавляется в радар как отдельная ось */
  const diseaseRisk = state.persona.disease==="Нет хронических заболеваний"?1:7;
  return [sleepRisk,activityRisk,dietRisk,stressRisk,smokeRisk,diseaseRisk];
}
function activateRisksHealth(){
  const p=state.healthProfile, R=[];
  const stressHi=p.stress==="Высокий";
  const sleepLow=p.sleep==="<6 часов"||p.sleep==="6–7 часов";
  const sleep5=p.sleep==="<6 часов";
  const stepsLow=p.steps==="<3000"||p.steps==="3000–6000";
  const dietBad=p.diet==="Редко";
  const smokeAny=p.smoke==="Иногда"||p.smoke==="Регулярно";
  if(stressHi||smokeAny) R.push("cvd");
  if(stepsLow&&dietBad) R.push("metabolic");
  if(sleepLow) R.push("immune");
  if(stressHi&&dietBad) R.push("gi");
  if(stepsLow&&p.sport==="Не занимаюсь") R.push("msk");
  if(stressHi&&sleepLow) R.push("burnout");
  if(smokeAny) R.push("resp");
  if(sleep5) R.push("sleep");
  /* форсируем риск из заболевания персонажа в начало */
  const force=DISEASE_RULES[state.persona.disease].forceRisk;
  if(force){
    const idx=R.indexOf(force);
    if(idx>=0) R.splice(idx,1);
    R.unshift(force);
  }
  return R;
}

function visitSystemBars(){
  /* Обращения по системам — на основе визитов персонажа + (для здоровых) демо-нолики */
  const p=state.persona;
  const bars={};
  const map={
    "Плановый осмотр / диспансеризация":"Профилактика",
    "ОРВИ или грипп":"Дыхательная",
    "Обострение хронического заболевания":"Хроника",
    "Боль (спина / голова / живот)":"ОДА / неврология",
    "Сдача анализов":"Лабораторно",
  };
  if(!p.noVisits){
    [p.visit1,p.visit2].forEach(v=>{ if(v){const k=map[v.reason]||"Прочее";bars[k]=(bars[k]||0)+1;}});
  }
  /* минимальное демо для непустой картины */
  if(Object.keys(bars).length===0) bars["Профилактика"]=1;
  return bars;
}

function buildPlanStepCard(step){
  const out = !!step.outOfCoverage;
  const c=document.createElement("div");
  c.className=`tp-card ${step.status}${out?" out":""}`;
  let actionBtn="";
  if(out && step.findDoctor){
    actionBtn = `<button class="book-btn" type="button" data-act="find">Найти врача</button>`;
  } else if(step.book){
    const label = (step.type==="exam" || step.book.mode==="exam")
      ? "Записаться на обследование"
      : (step.book.mode==="checkup" ? "Записаться на чекап" : "Записаться");
    actionBtn = `<button class="book-btn" type="button" data-act="book">${label}</button>`;
  }
  const outBlock = out
    ? `<div class="out-badge">Не входит в программу ДМС</div>
       <div class="out-note">Это назначение не покрывается твоей программой. Я помогу найти специалиста и сориентирую по стоимости.</div>`
    : "";
  c.innerHTML=`
    <div class="badge">${statusIcon(step.status)}</div>
    <div class="tp-body">
      <div class="tp-status">${statusLabel(step.status)}</div>
      <div class="tp-title">${step.title}</div>
      ${outBlock}
      <div class="tp-desc">${step.desc}</div>
      ${actionBtn}
    </div>
  `;
  const btn=c.querySelector(".book-btn");
  if(btn){
    btn.onclick=()=>{
      if(btn.dataset.act==="find") findPaidDoctorFromStep(step);
      else bookFromPlanStep(step);
    };
  }
  return c;
}

function renderTreatmentPlan(){
  app.appendChild(header({title:"План лечения"}));
  const pill=scenarioPill();if(pill)app.appendChild(pill);
  const wrap=document.createElement("div");wrap.className="screen-pad";
  const p=state.persona;

  /* Дополнение 2: гарантируем активный план для любого персонажа.
     - plan1 = план по визиту 1, если у визита есть план
     - maintenance = поддерживающая терапия по хроническому заболеванию
     - preventive = профилактический план для здоровых без визитов */
  const plan1 = planForVisit(p.visit1);
  const plan2 = planForVisit(p.visit2);
  const maintenance = maintenancePlanFor(p);
  /* Профилактический показываем, только если нет ни plan1, ни maintenance */
  const preventive = (!plan1 && !maintenance) ? preventivePlan(p) : null;

  const headerParts = [];
  if(plan1){
    headerParts.push(`<div style="font-size:13.5px;color:var(--g4);margin:6px 0 10px"><b>${plan1.title}</b> · от ${p.visit1.date}</div><div id="planPrimary"></div>`);
  } else if(maintenance){
    headerParts.push(`<div style="font-size:13.5px;color:var(--g4);margin:6px 0 10px"><b>${maintenance.title}</b> · постоянная терапия</div><div id="planPrimary"></div>`);
  } else if(preventive){
    headerParts.push(`<div style="font-size:13.5px;color:var(--g4);margin:6px 0 10px"><b>${preventive.title}</b></div><div id="planPrimary"></div>`);
  }
  /* Если и plan1, и maintenance — добавляем второй блок «Постоянная терапия» */
  if(plan1 && maintenance){
    headerParts.push(`<h3 style="margin:18px 0 6px;color:var(--green-d)">Постоянная терапия</h3>
      <div style="font-size:13.5px;color:var(--g4);margin:0 0 8px">${maintenance.title}</div>
      <div id="planMaintenance"></div>`);
  }
  if(plan2) headerParts.push(`<div id="prevPlanSlot"></div>`);

  wrap.innerHTML=`
    <h1 class="left">Твой план лечения</h1>
    <p style="color:var(--g3);font-size:13px;margin:0 0 14px">На основе твоих визитов и хронических заболеваний</p>
    ${headerParts.join("")}
  `;
  app.appendChild(wrap);

  /* Основной план */
  const primary = plan1 || maintenance || preventive;
  if(primary){
    const host=document.getElementById("planPrimary");
    primary.steps.forEach(s=>host.appendChild(buildPlanStepCard(s)));
  }
  /* Поддерживающая (если показывается отдельным блоком) */
  if(plan1 && maintenance){
    const host=document.getElementById("planMaintenance");
    maintenance.steps.forEach(s=>host.appendChild(buildPlanStepCard(s)));
  }
  /* Прошлый план — как было */
  if(plan2){
    const slot=document.getElementById("prevPlanSlot");
    const spoiler=document.createElement("div");spoiler.className="ehr-spoiler";spoiler.style.marginTop="14px";
    spoiler.innerHTML=`
      <div class="ehr-head">
        <div class="ehr-head-text">
          <div class="ehr-head-title">📋 Прошлые планы лечения</div>
          <div class="ehr-head-sub">${plan2.title} · от ${p.visit2.date}</div>
        </div>
        <div class="ehr-arrow">▼</div>
      </div>
      <div class="ehr-body"><div class="ehr-body-inner" id="plan2body"></div></div>
    `;
    spoiler.querySelector(".ehr-head").onclick=()=>spoiler.classList.toggle("open");
    slot.appendChild(spoiler);
    const body=spoiler.querySelector("#plan2body");
    plan2.steps.forEach(s=>body.appendChild(buildPlanStepCard({...s, status:"completed", book:null, outOfCoverage:false, findDoctor:null})));
  }

  const ans=document.createElement("div");ans.className="answers";
  /* «Где купить лекарства» — теперь всегда, у любого персонажа есть препараты */
  const meds = getAllMedications(p);
  if(meds.length){
    const bMed=document.createElement("button");bMed.className="btn";bMed.textContent="💊 Где купить лекарства";
    bMed.onclick=()=>{pushNav();state.selectedMed=null;state.screen="meds-list";render()};
    ans.appendChild(bMed);
  }
  const b=document.createElement("button");b.className="btn ghost";b.textContent="Вернуться в меню";
  b.onclick=()=>goToHub();
  ans.appendChild(b);
  app.appendChild(ans);app.appendChild(footerNote());
}

/* Демо-цены платных обследований по подсказкам названия (для случая outOfCoverage) */
function paidExamPrices(name){
  const n=(name||"").toLowerCase();
  if(n.indexOf("эхокг")>=0||n.indexOf("холтер")>=0) return [6500,6900,7200];
  if(n.indexOf("мрт")>=0) return [5800,6200,6500];
  if(n.indexOf("кт")>=0)  return [4500,4800,5100];
  if(n.indexOf("узи")>=0) return [2500,2800,2950];
  return [3000,3200,3500];
}

function renderClinicPicker(){
  const isExam = state.bookingMode==="exam";
  const isPaid = isExam && state.bookingExamPaid;
  const headerTitle = isExam ? "Запись на обследование" : (state.bookingTitle||"Выбор клиники");
  app.appendChild(header({title:headerTitle}));
  const pill=scenarioPill();if(pill)app.appendChild(pill);
  const wrap=document.createElement("div");wrap.className="screen-pad";
  const examName = state.bookingExamName||state.bookingSubtitle||"";
  const headingHtml = isExam
    ? `<h1 class="left" style="margin-bottom:4px">Где пройти:</h1>
       <p style="color:var(--black);font-size:15px;font-weight:600;margin:0 0 6px">${examName}</p>
       ${isPaid
         ? `<div class="out-note" style="margin:0 0 14px">⚠️ Платная услуга вне программы ДМС</div>`
         : `<div style="background:#E8F5E9;color:#1B5E20;border-left:3px solid var(--green);padding:9px 11px;border-radius:8px;font-size:12.5px;margin:0 0 14px">✓ Покрывается твоей программой ДМС</div>`
       }`
    : `<h1 class="left" style="margin-bottom:4px">Доступные клиники по твоему ДМС</h1>
       <p style="color:var(--g4);font-size:13.5px;margin:0 0 14px">${state.bookingSubtitle||""}</p>`;
  wrap.innerHTML=`${headingHtml}<div id="clinics"></div>`;
  app.appendChild(wrap);app.appendChild(footerNote());
  const list=document.getElementById("clinics");
  const prices = isPaid ? paidExamPrices(examName) : null;
  CLINICS.forEach((c,idx)=>{
    const stars="★".repeat(Math.round(c.rating))+"☆".repeat(5-Math.round(c.rating));
    const el=document.createElement("div");el.className="clinic-card";
    const avail = isExam ? `<div style="font-size:12.5px;color:var(--green-d);font-weight:500;margin-top:2px">${examName} · ближайший слот завтра</div>` : "";
    const priceLine = (isPaid && prices) ? `<div style="font-weight:700;font-size:15px;color:#D97706;margin-top:4px">${prices[idx].toLocaleString("ru-RU")} ₽</div>` : "";
    el.innerHTML=`
      <div class="clinic-name">${c.name}${isExam?" · Диагностический центр":""}</div>
      <div class="clinic-meta"><span>📍 ${c.distance}</span></div>
      ${avail}
      <div class="clinic-rating"><span class="stars">${stars}</span><span>${c.rating}</span><span class="reviews">· ${c.reviews} отзывов</span></div>
      ${priceLine}
      <button class="btn small">Выбрать</button>
    `;
    el.querySelector("button").onclick=()=>{
      pushNav();
      state.bookingClinic=c;
      if(isPaid && prices) state.bookingExamPrice = prices[idx];
      state.screen="slots";render();
    };
    list.appendChild(el);
  });
}
function renderTimeSlots(){
  app.appendChild(header({title:"Выбор времени"}));
  const pill=scenarioPill();if(pill)app.appendChild(pill);
  const wrap=document.createElement("div");wrap.className="screen-pad";

    <h1 class="left" style="margin-bottom:4px">Свободные слоты</h1>

    <div id="slots"></div>
  `;
  app.appendChild(wrap);app.appendChild(footerNote());
  const list=document.getElementById("slots");
  TIME_SLOTS.forEach(s=>{

function renderBooked(){

  app.appendChild(header({title:isExam?"Запись на обследование":"Запись подтверждена"}));
  const pill=scenarioPill();if(pill)app.appendChild(pill);

        </div>`;
    } else {
      costBlock = `<div class="dash-card" style="border-left:3px solid var(--green);background:#F2FAF4">
          <h3 style="color:var(--green-d)">Покрывается программой ДМС</h3>
          <div style="font-size:13.5px;color:var(--g4);line-height:1.5">Оплачивать ничего не нужно — обследование входит в твой полис «Стандарт+».</div>
        </div>`;
    }
  } else {
    costBlock = `<div class="dash-card">
        <h3>Запись</h3>
        <div style="color:var(--g4);font-size:14px;line-height:1.6">${state.bookingSubtitle||"Приём специалиста"}</div>
      </div>`;
  }
  const headline = isExam
    ? `Запись на «${examName}» подтверждена`
    : `Готово! Запись подтверждена`;
  const footerHint = isExam
    ? `<span style="color:var(--g3);font-size:13px">Результаты будут доступны в твоей медкарте</span>`
    : `<span style="color:var(--g3);font-size:13px">Напоминание придёт за день до визита</span>`;
  wrap.innerHTML=`
    <div class="hero-icon" style="background:linear-gradient(135deg,#21A038,#00833E);font-size:50px">✓</div>
    <h1>${headline}</h1>
    <p style="text-align:center;color:var(--g4);margin:0 0 14px;font-size:14.5px">
      ${clinic?`<b>${clinic.name}</b><br>`:""}
      ${s.d}, ${s.t}<br>
      ${footerHint}
    </p>
    ${costBlock}
  `;
  app.appendChild(wrap);
  const ans=document.createElement("div");ans.className="answers";
  const b=document.createElement("button");b.className="btn";b.textContent="В главное меню";
  b.onclick=()=>goToHub();
  ans.appendChild(b);
  app.appendChild(ans);app.appendChild(footerNote());
}

  {q:"Какие клиники мне доступны?",
   a:"По твоей программе доступны 3 клиники в Москве: Клиника Семейная (м. Сухаревская), СМ-Клиника (м. Войковская) и Медси на Пресне (м. Улица 1905 года). В любой можно записаться через меня — в каждой доступен полный спектр услуг по программе."},

  {q:"Что делать, если услуги нет в программе?",
   a:"Тогда есть два варианта. Первый — получить услугу в клинике-партнёре со скидкой по тарифу страховой, это обычно дешевле прайса. Второй — для разовых дорогих процедур иногда возможно согласование расширения с работодателем. Скажи, какая услуга нужна, — проверю."},

async function startInsurance(){
  state.currentScenario="insurance";
  state.chat=[];state.answers=null;state.busy=false;
  state.screen="chat";render();
  await evaSay("Я помогу разобраться с твоей программой ДМС. Что тебя интересует?");
  showInsuranceMenu();
}
function showInsuranceMenu(){
  setSingleAnswers(
    INSURANCE_QA.map((qa,i)=>({label:qa.q, value:String(i)})),
    async (idx,lbl)=>{
      userSay(lbl);
      await evaSay(INSURANCE_QA[parseInt(idx,10)].a);
      setSingleAnswers(
        [{label:"Задать другой вопрос",value:"more"},{label:"Вернуться в меню",value:"home"}],
        (val,lbl2)=>{
          userSay(lbl2);
          if(val==="more") showInsuranceMenu();
          else goToHub();
        }
      );
    }
  );
}
